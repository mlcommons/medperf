{% extends "base.html" %}

{% block title %}Security Check{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="bg-card dark:bg-card rounded-2xl p-8 shadow-xl border-2 border-border-brand dark:border-border">
            <h2 class="text-2xl font-bold text-brand-accent text-center mb-6">Security Check</h2>

            {% if error %}
            <div class="mb-6 p-4 rounded-xl bg-danger-muted border-2 border-danger text-danger-fg text-center" role="alert">
                {{ error }}
            </div>
            {% endif %}

            <form id="security-check-form" method="POST" action="/security_check">
                <input type="hidden" name="redirect_url" value="{{ redirect_url }}">
                <div class="mb-6">
                    <label for="token" class="block text-secondary font-semibold mb-2">Enter your Security Token printed in MedPerf CLI output</label>
                    <input type="text" id="token" name="token" class="w-full px-4 py-3 rounded-xl border-2 border-border-strong dark:border-border dark:bg-card-muted dark:text-ink focus:outline-none focus:border-brand-accent" placeholder="security token" required>
                </div>
                <div class="text-center">
                    <button id="security-check-btn" type="button" class="btn btn-primary btn-block transition-all">Access Web UI</button>
                </div>
            </form>
            <div class="text-center mt-4">
                <button type="button" class="text-brand-accent hover:underline font-medium" id="show-help-modal">Why is this required?</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function() {
    document.getElementById("security-check-btn").addEventListener("click", function(e) {
        e.currentTarget.disabled = true;
        document.getElementById("security-check-form").submit();
    });
    document.getElementById("show-help-modal").addEventListener("click", function() {
        var modalBody = "<p class=\"text-lg\">This token is a simple way to make sure that only the person who started the app, can access this page.<br><br>When the app starts, it shows a one-time code (the security token) in the terminal. You just copy that code and paste it here.<br><br>It is a safety step to prevent other users on the same computer from seeing your data or using the app without permission.</p>";
        var modalFooter = "<button type=\"button\" class=\"btn btn-sm btn-danger close-modal-btn\">Close</button>";
        showModal({ title: "Security Check Help", body: modalBody, footer: modalFooter, modalClasses: "max-w-2xl w-full" });
    });
})();
</script>
{% endblock %}
