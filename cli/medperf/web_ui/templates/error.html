{% extends "base.html" %}

{% block title %}Error{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-12 max-w-3xl">
    <h1 class="text-3xl font-bold text-brand-accent mb-6">An Error Occurred</h1>
    <div class="bg-danger-muted border-2 border-danger rounded-xl p-6" role="alert">
        <p class="text-danger-fg"><strong>Error:</strong> {{ exception }}</p>
        <p class="text-danger-fg mt-2"><strong>Request:</strong> {{ request.url }}</p>
        <p class="text-danger-fg"><strong>Method:</strong> {{ request.method }}</p>
        <p class="text-danger-fg"><strong>Client:</strong> {{ request.client }}</p>
    </div>
</div>
{% endblock %}
