{% macro aggregator_card(agg) %}
<div class="bg-card dark:bg-card medperf-card dark:border-brand-accent/50 rounded-xl p-6 shadow-lg hover:shadow-xl transition-all border border-transparent dark:border-border flex flex-col h-full">
    <div class="flex items-start justify-between mb-4">
        <div class="flex-1 min-w-0">
            <div class="flex items-center mb-2">
                <i class="fas fa-server text-brand-accent mr-2 flex-shrink-0"></i>
                <h3 class="text-xl font-bold text-ink truncate">
                    <a href="/aggregators/ui/display/{{ agg.id }}" class="hover:text-brand-accent transition-colors" data-testid="agg-name">{{ agg.name }}</a>
                </h3>
            </div>
            <p class="text-sm text-muted-fg" data-testid="agg-id">ID: {{ agg.id }}</p>
        </div>
    </div>
    <p class="text-secondary mb-2"><span class="font-semibold">Address:</span> {{ agg.address }}:{{ agg.port }}</p>
    <div class="flex items-center justify-between pt-4 mt-auto border-t-2 border-border">
        <span class="text-xs text-muted-fg" data-testid="agg-created-at" data-date="{{ agg.created_at }}" data-date-format="timeago"></span>
    </div>
</div>
{% endmacro %}
