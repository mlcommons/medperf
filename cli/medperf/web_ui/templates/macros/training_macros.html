{% macro training_experiment_card(exp) %}
<div class="bg-white dark:bg-gray-800 medperf-card dark:border-green-500/50 rounded-xl p-6 shadow-lg hover:shadow-xl transition-all border border-transparent dark:border-gray-700 flex flex-col h-full">
    <div class="flex items-start justify-between mb-4">
        <div class="flex-1 min-w-0">
            <div class="flex items-center mb-2">
                <i class="fas fa-flask medperf-accent dark:text-green-400 mr-2 flex-shrink-0"></i>
                <h3 class="text-xl font-bold text-gray-900 dark:text-white truncate">
                    <a href="/training/ui/display/{{ exp.id }}" class="hover:medperf-accent dark:hover:text-green-400 transition-colors" data-testid="training-name">{{ exp.name }}</a>
                </h3>
            </div>
            <p class="text-sm text-gray-500 dark:text-gray-400" data-testid="training-id">ID: {{ exp.id }}</p>
        </div>
        <span class="px-4 py-1 rounded-full text-xs font-bold border-2 flex-shrink-0 {% if exp.state == 'OPERATION' %}bg-green-100 dark:bg-green-900/50 text-green-700 dark:text-green-300 border-green-200 dark:border-green-700{% else %}bg-yellow-100 dark:bg-yellow-900/50 text-yellow-700 dark:text-yellow-300 border-yellow-200 dark:border-yellow-700{% endif %}" data-testid="training-state">{% if exp.state == 'OPERATION' %}OPERATIONAL{% else %}{{ exp.state }}{% endif %}</span>
    </div>
    <p class="text-gray-700 dark:text-gray-300 mb-2 line-clamp-2 flex-1">{% if exp.description %}{{ exp.description }}{% else %}—{% endif %}</p>
    <p class="text-xs text-gray-500 dark:text-gray-400 mb-3" data-testid="training-approval">Approval: {{ exp.approval_status or 'PENDING' }}</p>
    <div class="flex items-center justify-between pt-4 mt-auto border-t-2 border-gray-100 dark:border-gray-700">
        <span class="text-xs text-gray-500 dark:text-gray-400" data-testid="training-created-at" data-date="{{ exp.created_at }}" data-date-format="timeago"></span>
    </div>
</div>
{% endmacro %}
