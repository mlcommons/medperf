<div id="panel" class="my-8 hidden" style="display: none;">
    <h2 id="panel-title" class="text-xl font-bold text-brand-accent mb-4"></h2>
    <div class="mb-4">
        <ul id="stages-list" class="space-y-2 text-ink"></ul>
    </div>
    <div id="log-panel-section" class="hidden" aria-hidden="true">
        <div class="bg-card dark:bg-card rounded-xl p-6 shadow-lg border-2 border-border-brand dark:border-border mt-6">
            <div class="flex items-center justify-between gap-3 mb-3">
                <h3 class="text-base font-semibold text-ink">Logs</h3>
                <button
                    id="toggle-log-panel-btn"
                    type="button"
                    class="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg border border-border-strong text-sm font-medium text-secondary hover:bg-muted cursor-pointer"
                    aria-expanded="false"
                    aria-controls="log-panel-container"
                >
                    <span id="toggle-log-panel-text">Expand</span>
                    <i id="toggle-log-panel-icon" class="fas fa-chevron-down" aria-hidden="true"></i>
                </button>
            </div>
            <div id="log-panel-container" class="log-panel-collapsed">
                <pre id="log-panel" class="text-sm overflow-x-auto whitespace-pre-wrap font-mono bg-muted text-ink p-4 rounded-lg max-h-[300px] overflow-y-auto"></pre>
            </div>
        </div>
    </div>
</div>
