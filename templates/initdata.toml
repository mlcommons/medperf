algorithm = "sha384"
version = "0.1.0"

[data]
"aa.toml" = '''
[token_configs]
[token_configs.coco_as]
url = 'http://{as_address}:{as_port}'

[token_configs.kbs]
url = 'https://{as_address}:{as_kbs_port}'
cert = """
{as_kbs_cert}
"""

'''

"cdh.toml"  = '''
socket = 'unix:///run/confidential-containers/cdh.sock'
credentials = []

[kbc]
name = 'cc_kbc'
url = 'https://{model_kbs_address}:{model_kbs_port}'
kbs_cert = """
{model_kbs_cert}
"""

'''

"policy.rego" = '''
package agent_policy

import future.keywords.in
import future.keywords.every

import input

# Default values, returned by OPA when rules cannot be evaluated to true.
default CopyFileRequest := true
default CreateContainerRequest := false
default CreateSandboxRequest := true
default DestroySandboxRequest := true
default ExecProcessRequest := true
default GetOOMEventRequest := true
default GuestDetailsRequest := true
default OnlineCPUMemRequest := true
default PullImageRequest := true
default ReadStreamRequest := true
default RemoveContainerRequest := true
default RemoveStaleVirtiofsShareMountsRequest := true
default SignalProcessRequest := true
default StartContainerRequest := true
default StatsContainerRequest := true
default TtyWinResizeRequest := true
default UpdateEphemeralMountsRequest := true
default UpdateInterfaceRequest := true
default UpdateRoutesRequest := true
default WaitProcessRequest := true
default WriteStreamRequest := true

CreateContainerRequest if {{
	every storage in input.storages {{
        some allowed_image in policy_data.allowed_images
        storage.source == allowed_image
    }}
}}

policy_data := {{
	"allowed_images": [
		"{metrics_image}",
		"{model_image}",
	],
}}
'''
