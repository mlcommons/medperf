{% macro training_experiment_card(exp) %}
<div class="bg-card dark:bg-card medperf-card dark:border-brand-accent/50 rounded-xl p-6 shadow-lg hover:shadow-xl transition-all border border-transparent dark:border-border flex flex-col h-full">
    <div class="flex items-start justify-between mb-4">
        <div class="flex-1 min-w-0">
            <div class="flex items-center mb-2">
                <i class="fas fa-flask text-brand-accent mr-2 flex-shrink-0"></i>
                <h3 class="text-xl font-bold text-ink truncate">
                    <a href="/training/ui/display/{{ exp.id }}" class="hover:text-brand-accent transition-colors" data-testid="training-name">{{ exp.name }}</a>
                </h3>
            </div>
            <p class="text-sm text-muted-fg" data-testid="training-id">ID: {{ exp.id }}</p>
        </div>
        <span class="px-4 py-1 rounded-full text-xs font-bold border-2 flex-shrink-0 {% if exp.state == 'OPERATION' %}bg-success-muted text-brand-accent border-success{% else %}bg-warning-muted text-warning-fg border border-warning{% endif %}" data-testid="training-state">{% if exp.state == 'OPERATION' %}OPERATIONAL{% else %}{{ exp.state }}{% endif %}</span>
    </div>
    <p class="text-secondary mb-2 line-clamp-2 flex-1">{% if exp.description %}{{ exp.description }}{% else %}—{% endif %}</p>
    <p class="text-xs text-muted-fg mb-3" data-testid="training-approval">Approval: {{ exp.approval_status or 'PENDING' }}</p>
    <div class="flex items-center justify-between pt-4 mt-auto border-t-2 border-border">
        <span class="text-xs text-muted-fg" data-testid="training-created-at" data-date="{{ exp.created_at }}" data-date-format="timeago"></span>
    </div>
</div>
{% endmacro %}
