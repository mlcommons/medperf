<div class="mb-6 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 shadow px-4 py-3.5 sm:px-5 sm:py-4">
    <div class="flex flex-col gap-3 sm:flex-row sm:flex-wrap sm:items-center sm:justify-between sm:gap-x-6 sm:gap-y-3">
        <div class="flex flex-wrap items-center gap-x-4 gap-y-3">
            <label class="relative inline-flex items-center cursor-pointer shrink-0 max-w-full">
                <input type="checkbox" class="sr-only peer" id="switch" data-entity-name="{{ entity_name }}" {% if mine_only %}checked{% endif %}>
                <div class="relative w-14 h-7 shrink-0 rounded-full bg-gray-300 dark:bg-gray-600 peer-focus-visible:ring-2 peer-focus-visible:ring-green-500 peer-focus-visible:ring-offset-2 dark:peer-focus-visible:ring-offset-gray-800 peer-checked:after:translate-x-[1.5rem] peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[4px] after:bg-white after:rounded-full after:h-6 after:w-6 after:shadow after:transition-all peer-checked:bg-green-600"></div>
                <span class="ml-3 text-base text-gray-700 dark:text-gray-200 font-medium">Mine only</span>
            </label>
            {% if has_items %}
            <span class="hidden sm:inline self-stretch w-px min-h-[1.75rem] bg-gray-200 dark:bg-gray-600 shrink-0" aria-hidden="true"></span>
            <div class="flex items-center gap-2.5 sm:gap-3">
                <label for="ordering" class="text-sm font-medium text-gray-600 dark:text-gray-300 whitespace-nowrap">Sort</label>
                <select id="ordering" class="text-base py-2 pl-3 pr-10 rounded-xl border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-green-500/30 focus:border-green-500 cursor-pointer min-w-[10.5rem] max-w-[16rem]">
                    <option value="created_at_desc" {% if ordering == "created_at_desc" %}selected{% endif %}>Newest</option>
                    <option value="created_at_asc" {% if ordering == "created_at_asc" %}selected{% endif %}>Oldest</option>
                    <option value="name_asc" {% if ordering == "name_asc" %}selected{% endif %}>Name A–Z</option>
                    <option value="name_desc" {% if ordering == "name_desc" %}selected{% endif %}>Name Z–A</option>
                </select>
            </div>
            <div class="flex items-center gap-2.5 sm:gap-3">
                <label for="page-size" class="text-sm font-medium text-gray-600 dark:text-gray-300 whitespace-nowrap">Per page</label>
                <select id="page-size" class="text-base py-2 pl-3 pr-10 rounded-xl border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-green-500/30 focus:border-green-500 cursor-pointer min-w-[6.5rem] w-[6.5rem] shrink-0">
                    {% for size in [6, 9, 12, 24] %}
                    <option value="{{ size }}" {% if page_size == size %}selected{% endif %}>{{ size }}</option>
                    {% endfor %}
                </select>
            </div>
            {% endif %}
        </div>
        {% if total_count %}
        <p class="text-sm text-gray-600 dark:text-gray-400 tabular-nums sm:text-right shrink-0 font-medium">{{ start_index }}–{{ end_index }} <span class="font-normal text-gray-500 dark:text-gray-500">of</span> {{ total_count }}</p>
        {% endif %}
    </div>
</div>
